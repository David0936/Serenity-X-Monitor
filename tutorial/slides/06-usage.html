<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><link rel="stylesheet" href="base.css">
<style>
  .shots { position:absolute; left:96px; right:96px; top:330px; display:grid; grid-template-columns:1fr 1fr; gap:50px; align-items:start; }
  .shots .win { height:545px; overflow:hidden; }
  .cap { font-size:24px; margin-bottom:16px; color:#c5c9d3; }

  .note { position:absolute; left:96px; right:96px; bottom:120px; text-align:center; font-size:25px; color:#aeb4c2; }
  .note .pill { display:inline-block; background:rgba(76,141,255,.12); border:1px solid rgba(76,141,255,.3); border-radius:999px; padding:8px 22px; color:#cfe0ff; }

  <div class="wm">CLA<span class="c">W</span>ORLD</div>
